name: Production Smoke

on:
  workflow_dispatch:
  schedule:
    - cron: "17 * * * *"

jobs:
  production-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run production smoke checks
        run: bash scripts/post-deploy-smoke.sh
