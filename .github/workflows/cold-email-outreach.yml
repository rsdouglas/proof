name: Cold Email Outreach

on:
  workflow_dispatch:
    inputs:
      targets_json:
        description: 'JSON array of targets: [{"name":"Business","email":"owner@example.com","niche":"Hair Salon","city":"Austin TX"},...]'
        required: true
        type: string
      dry_run:
        description: 'Dry run only (true = preview, false = actually send)'
        required: true
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      batch_label:
        description: 'Label for this batch (e.g. "austin-salons-batch2")'
        required: false
        default: 'outreach'
        type: string

jobs:
  send-outreach:
    name: Send outreach (${{ inputs.batch_label }}, dry_run=${{ inputs.dry_run }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Confirm live send
        if: inputs.dry_run == 'false'
        run: |
          echo "⚠️  LIVE SEND — ${{ inputs.batch_label }}"
          echo "Targets will receive real emails from hello@socialproof.dev"
          echo "This cannot be undone."

      - name: Run cold email outreach
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          TARGETS_JSON: ${{ inputs.targets_json }}
          DRY_RUN: ${{ inputs.dry_run }}
          BATCH_LABEL: ${{ inputs.batch_label }}
        run: node scripts/send-outreach-v2.js

      - name: Job summary
        run: |
          echo "## Cold Email Outreach — ${{ inputs.batch_label }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            echo "✅ **DRY RUN COMPLETE** — no emails sent" >> $GITHUB_STEP_SUMMARY
            echo "Re-run with dry_run=false to send for real." >> $GITHUB_STEP_SUMMARY
          else
            echo "✅ **BATCH SENT** — check Resend dashboard: https://resend.com/emails" >> $GITHUB_STEP_SUMMARY
          fi
