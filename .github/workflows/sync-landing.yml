name: Sync Landing

on:
  push:
    branches: [main]
    paths:
      - 'apps/marketing-site/src/**'
      - 'apps/marketing-site/public/**'
      - 'apps/marketing-site/astro.config.*'
      - 'tools/sync-landing.sh'

concurrency:
  group: sync-landing
  cancel-in-progress: true

jobs:
  sync:
    name: Build Astro & Sync Landing
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Astro
        run: npm run build -w apps/marketing-site

      - name: Sync dist → apps/landing
        run: bash tools/sync-landing.sh

      - name: Commit synced landing files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/landing/
          if git diff --cached --quiet; then
            echo "No landing changes to commit — already in sync."
          else
            CHANGED=$(git diff --cached --name-only | wc -l)
            git commit -m "chore: auto-sync landing from Astro build [skip ci]

          Synced $CHANGED file(s) from apps/marketing-site/src → apps/landing/.
          Triggered by: ${{ github.sha }} (${{ github.event.head_commit.message }})"
            git push origin main
          fi
