name = "vouch-worker"
account_id = "6f8a4a1c8a93a311972f002e18f2c8ac"
main = "src/index.ts"
compatibility_date = "2024-09-10"
compatibility_flags = ["nodejs_compat"]

[[d1_databases]]
binding = "DB"
database_name = "vouch-db"
database_id = "1f4ebaa7-6a2b-4842-85c4-115e42af7345"
migrations_dir = "migrations"

[[kv_namespaces]]
binding = "WIDGET_KV"
id = "731e18288e9e4de091e01e0a5d6d3cc4"

# Stripe secrets - set via: wrangler secret put STRIPE_SECRET_KEY
# Required: STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, STRIPE_PRO_PRICE_ID

[vars]
ENVIRONMENT = "production"

[triggers]
crons = ["0 * * * *"]  # Run hourly for drip email sequence

[dev]
port = 8787

# Email/DKIM secrets - set via wrangler secret put
# Required for DKIM signing (prevents spam filtering):
#   DKIM_PRIVATE_KEY  - PKCS8 RSA private key (no newlines, base64)
#   DKIM_DOMAIN       - e.g. socialproof.dev
#   DKIM_SELECTOR     - e.g. mailchannels (must match DNS TXT record)
# DNS records needed (see issue #71):
#   TXT mailchannels._domainkey.socialproof.dev  v=DKIM1; p=<public-key>
#   TXT _mailchannels.socialproof.dev            v=mc1 cfid=vouch-worker.workers.dev
#   TXT socialproof.dev                          v=spf1 a mx include:relay.mailchannels.net ~all
